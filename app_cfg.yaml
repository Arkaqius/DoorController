### DOOR CONTROLLERS START
# Detailed Help for Creating Configuration:
# 1. Module and Class (Required):
#    - module: The name of the Python module file (without .py extension) where the DoorController class is defined.
#    - class: The name of the class to instantiate, which should be DoorController in this case.
#
# 2. Logging Level (Optional):
#    - log_level: Sets the verbosity of the logs. Use DEBUG for detailed logging during development and troubleshooting.
#
# 3. Physical Inputs:
#    - close_sensor (Optional): Entity ID of the binary sensor that indicates when the door is fully closed.
#    - close_sensor_active_state (Optional): Raw state treated as "closed reached" for close_sensor. Defaults to "off" for backward compatibility.
#    - open_sensor (Optional): Entity ID of the binary sensor that indicates when the door is fully open.
#    - open_sensor_active_state (Optional): Raw state treated as "open reached" for open_sensor. Defaults to "off" for backward compatibility.
#
# 4. Physical Outputs:
#    - door_relay (Required): Entity ID of the switch that controls the door or gate motor (usually a relay).
#
# 5. Calibration (Optional):
#    - timeout: Time in seconds to wait for door operation to complete before considering it a fault. Adjust this based on your door or gate's typical operation time.
#
# 6. App Generated Entities:
#    - input_button.<friendly_name_slug>_open
#    - input_button.<friendly_name_slug>_close
#    - input_button.<friendly_name_slug>_external
#    - sensor.<friendly_name_slug>_status
#    - sensor.<friendly_name_slug>_health
#
# 7. Friendly Name (Optional):
#    - friendly_name: Used for display names and generated entity IDs.
#
# Example Usage:
# - For a garage door with physical contact sensors, you can configure both close_sensor and open_sensor.
# - For a single-sensor setup, configure only close_sensor and set close_sensor_active_state: "on" when the sensor is true/on while the door is closed.
# - For a gate without physical sensors, you can omit the sensor configurations and just use a relay.
# - The app creates its own open/close/external command entities plus status and health sensors during initialization.

# Garage Door Controller Configuration
GarageDoorController:
  module: DoorController # Specifies the module where the DoorController class is located
  class: DoorController # Specifies the class to be instantiated
  log_level: INFO # Sets the logging level for this app
  friendly_name: "Garage Door" # A friendly name for the whole app to be used in Home Assistant UI

  # Physical Inputs
  close_sensor: binary_sensor.garage_gatedoorlow_contact_contact # Physical contact sensor for closed position (Optional)
  # close_sensor_active_state: "on" # Uncomment when the closed-position sensor is true/on while the door is closed
  open_sensor: binary_sensor.garage_gatedoorhigh_contact_contact # Physical contact sensor for open position (Optional)
  # open_sensor_active_state: "on" # Uncomment when the open-position sensor is true/on while the door is open

  # Physical Outputs
  door_relay: switch.sonoff_basic_relay # Physical relay to control the door motor (Required)

  # Calibration
  timeout: 20 # Timeout in seconds for door operation, used for diagnostics (Optional)

  # App will create:
  # input_button.garage_door_open
  # input_button.garage_door_close
  # input_button.garage_door_external
  # sensor.garage_door_status
  # sensor.garage_door_health

# External Gate Controller Configuration
ExternalGateController:
  module: DoorController # Specifies the module where the DoorController class is located
  class: DoorController # Specifies the class to be instantiated
  log_level: DEBUG # Sets the logging level for this app
  friendly_name: "External Gate" # A friendly name for the whole app to be used in Home Assistant UI

  # Physical Inputs
  close_sensor: binary_sensor.frontyard_externalgate_contact_contact # Physical contact sensor for closed position (Optional)

  # Physical Outputs
  door_relay: switch.garage_gate_relay # Physical relay to control the gate motor (Required)

  # Calibration
  timeout: 30 # Timeout in seconds for gate operation, used for diagnostics (Optional)

  # App will create:
  # input_button.external_gate_open
  # input_button.external_gate_close
  # input_button.external_gate_external
  # sensor.external_gate_status
  # sensor.external_gate_health


### DOOR CONTROLLERS END
